fragment ProductVariation on ProductVariation {
  name
  databaseId
  price
  regularPrice
  salePrice
  rawSalePrice: salePrice(format: RAW)
  slug
  stockQuantity
  stockStatus
  hasAttributes
  image {
    sourceUrl
    altText
    title
    databaseId
    cartSourceUrl: sourceUrl(size: THUMBNAIL)
    productCardSourceUrl: sourceUrl(size: WOOCOMMERCE_THUMBNAIL)
  }
  attributes {
    nodes {
      ...VariationAttribute
    }
  }
}
